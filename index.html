    <script>
      (() => {
        const measurementId = 'G-PSFRL4CNV1';
        const optOutCookieName = 'analytics_opt_out';
        const hasOptOutCookie = document.cookie
          .split('; ')
          .some((cookie) => cookie === `${optOutCookieName}=1`);

        window[`ga-disable-${measurementId}`] = hasOptOutCookie;

        if (hasOptOutCookie) {
          return;
        }

        window.dataLayer = window.dataLayer || [];
        window.gtag = function gtag() {
          window.dataLayer.push(arguments);
        };

        const googleTagScript = document.createElement('script');
        googleTagScript.async = true;
        googleTagScript.src = `https://www.googletagmanager.com/gtag/js?id=${measurementId}`;
        document.head.appendChild(googleTagScript);

        window.gtag('js', new Date());
        window.gtag('config', measurementId);
      })();
    </script>

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />
    <script>
      (() => {
        const override = window.sessionStorage.getItem('theme-override');
        const hour = new Date().getHours();
        const defaultTheme = hour >= 19 || hour < 7 ? 'dark' : 'light';
        const theme = override === 'light' || override === 'dark' ? override : defaultTheme;
        const root = document.documentElement;

        root.classList.toggle('dark', theme === 'dark');
        root.dataset.theme = theme;

        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', theme === 'dark' ? '#050814' : '#fcfcfa');
        }
      })();
    </script>
